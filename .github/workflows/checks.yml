name: Checks

on:
  pull_request:
  push:
    branches: [master]

# Reusable workflows can only restrict the caller's permissions, never elevate
# them — and the reusable workflow declares `statuses: write` (for the
# coverage-monitor commit status) on every run. So a caller with a
# `permissions:` block MUST include `statuses: write`.
permissions:
  contents: read
  pull-requests: write
  statuses: write

jobs:
  checks:
    uses: kaisekidev/.github/.github/workflows/checks.yml@v1
